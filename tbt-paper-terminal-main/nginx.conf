server {
    listen 80;
    server_name 154.36.164.246;

    root /var/www/tbt-paper-terminal/dist;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # 禁止直接访问 assets 目录
    location = /assets/ {
        return 404;
    }
    
    # 静态资源缓存（匹配所有 assets 下的文件）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # 禁止目录列表
        autoindex off;
        # 如果请求的是目录，返回 404
        try_files $uri =404;
    }

    # Binance API 代理
    location /binance-api/ {
        proxy_pass https://api.binance.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.binance.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS 头
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 日志
    access_log /var/log/tbt-paper-terminal/access.log;
    error_log /var/log/tbt-paper-terminal/error.log;
}

